<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Project Delivery - Case Studies</title>

<style>
:root {
  --ink: #0f2742;
  --muted: #6b7280;
  --tile-bg: #ffffff;
  --tile-border: #e5e7eb;
  --tile-shadow: 0 10px 18px rgba(0,0,0,.06);
  --brand: #233b63;
  --accent: #244a86;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  color: var(--ink);
  font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;

  background:
    linear-gradient(rgba(10,25,45,0.82), rgba(10,25,45,0.92)),
    url("./background.png");

  background-size: cover;
  background-position: center;
  background-attachment: fixed;
}

header { padding: 28px 22px 8px; }

h1 {
  margin: 0 0 12px;
  font-weight: 800;
  letter-spacing: .2px;
  color: #ffffff;
}

main { padding: 12px 22px 12px; }

.grid {
  display: grid;
  gap: 18px;
  grid-template-columns: repeat(5, minmax(0, 1fr));
}

@media (max-width: 1280px) { .grid { grid-template-columns: repeat(4, 1fr); } }
@media (max-width: 980px)  { .grid { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 720px)  { .grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 480px)  { .grid { grid-template-columns: 1fr; } }

.tile {
  background: var(--tile-bg);
  border: 1px solid var(--tile-border);
  border-radius: 16px;
  box-shadow: var(--tile-shadow);
  text-decoration: none;
  color: inherit;
  height: 150px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform .12s ease, box-shadow .12s ease, border-color .12s ease;
}

.tile:hover {
  transform: translateY(-2px);
  border-color: #d1d5db;
  box-shadow: 0 16px 26px rgba(0,0,0,.08);
}

.tile-inner { text-align: center; }

.tile-line1 {
  font-size: 13px;
  font-weight: 800;
  color: #8b95a6;
  letter-spacing: .8px;
  margin-bottom: 6px;
}

.tile-line2 {
  font-size: 20px;
  font-weight: 800;
  color: #244a86;
  letter-spacing: .3px;
}

footer { padding: 12px 22px 28px; }

.bottom {
  display: grid;
  grid-template-columns: 1fr minmax(0, 620px) 1fr;
  gap: 12px;
  align-items: start;
}

.left { justify-self: start; }
.center { justify-self: center; }
.right { justify-self: end; }

.btn {
  background: #0f2742;
  color: #fff;
  font-weight: 700;
  padding: 10px 16px;
  border-radius: 14px;
  text-decoration: none;
}

.btn.secondary {
  background: #ffffff22;
  color: #ffffff;
}

.tabs {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: center;
}

.tab {
  background: #e6ebf5;
  color: #0f2742;
  padding: 8px 12px;
  border-radius: 12px;
  font-weight: 700;
  cursor: pointer;
  border: none;
}

.tab.active {
  background: #21a3661a;
  outline: 2px solid #21a366;
}

.chips {
  padding-top: 10px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: center;
}

.chip {
  background: #eef2f7;
  color: #0f2742;
  padding: 6px 10px;
  border-radius: 999px;
  border: 1px solid #e2e8f0;
  font-weight: 600;
  cursor: pointer;
}

.chip[aria-pressed="true"] {
  outline: 2px solid #21a366;
  background: #21a3661a;
}

.chip.disabled {
  opacity: .5;
  cursor: default;
}

.panel { display: none; }
.panel.active { display: block; }
</style>
</head>

<body>

<header>
<h1>Project Delivery - Case Studies</h1>
</header>

<main>
<div class="grid">

<a class="tile" href="./CS01.html">
<div class="tile-inner">
<div class="tile-line1">Case Study</div>
<div class="tile-line2">PULSE</div>
</div>
</a>

<a class="tile" href="./CS02.html">
<div class="tile-inner">
<div class="tile-line1">Case Study</div>
<div class="tile-line2">COMPASS</div>
</div>
</a>

<a class="tile" href="./CS03.html">
<div class="tile-inner">
<div class="tile-line1">Case Study</div>
<div class="tile-line2">NXT RAW</div>
</div>
</a>

<a class="tile" href="./CS04.html">
<div class="tile-inner">
<div class="tile-line1">Case Study</div>
<div class="tile-line2">BEACON</div>
</div>
</a>

<a class="tile" href="./CS05.html">
<div class="tile-inner">
<div class="tile-line1">Case Study</div>
<div class="tile-line2">SPARROW</div>
</div>
</a>

</div>
</main>

<footer>
<div class="bottom">
<div class="left">
<a class="btn" href="./overview.html">Overview</a>
</div>
</div>
</footer>

</body>
</html>
