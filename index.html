<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1" name="viewport"/>
<title>Project Delivery - Case Studies</title>

<style>
:root {
  --ink: #0f2742;
}

* { box-sizing: border-box; }

/* =========================
   BACKGROUND (FIXED)
========================= */
body {
  margin: 0;

  background-image: url("/background.png");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  background-attachment: fixed;

  font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto;
}

/* 🔥 THIS FIXES EVERYTHING */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(10, 30, 60, 0.55);
  z-index: -1;
}

/* =========================
   HEADER
========================= */
header { padding: 28px 22px 8px; }

h1 {
  margin: 0 0 12px;
  font-weight: 800;
  letter-spacing: .2px;
  color: #ffffff;
  text-shadow: 0 2px 12px rgba(0,0,0,0.5);
}

/* =========================
   MAIN
========================= */
main {
  padding: 12px 22px 12px;
}

/* =========================
   GRID
========================= */
.grid {
  display: grid;
  gap: 18px;
  grid-template-columns: repeat(5, minmax(0, 1fr));
}

@media (max-width: 1280px) { .grid { grid-template-columns: repeat(4, 1fr); } }
@media (max-width: 980px)  { .grid { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 720px)  { .grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 480px)  { .grid { grid-template-columns: 1fr; } }

/* =========================
   TILE
========================= */
.tile {
  background: rgba(255,255,255,0.92);
  border-radius: 16px;

  text-decoration: none;
  color: var(--ink);

  height: 150px;
  display: flex;
  align-items: center;
  justify-content: center;

  box-shadow: 0 20px 50px rgba(0,0,0,0.35);
  backdrop-filter: blur(6px);

  transition: transform .12s ease, box-shadow .12s ease;
}

.tile:hover {
  transform: translateY(-2px);
  box-shadow: 0 30px 70px rgba(0,0,0,0.45);
}

.tile-inner { text-align: center; }

.tile-line1 {
  font-size: 13px;
  font-weight: 800;
  color: #8b95a6;
  margin-bottom: 6px;
}

.tile-line2 {
  font-size: 20px;
  font-weight: 800;
  color: #244a86;
}

/* =========================
   FOOTER
========================= */
footer {
  padding: 12px 22px 28px;
  color: #ffffff;
}

.bottom {
  display: grid;
  grid-template-columns: 1fr minmax(0, 620px) 1fr;
  gap: 12px;
  align-items: start;
}

.left { justify-self: start; }
.center { justify-self: center; }
.right { justify-self: end; }

.btn {
  background: #0f2742;
  color: #fff;
  font-weight: 700;
  padding: 10px 16px;
  border-radius: 14px;
  text-decoration: none;
}

.btn.secondary {
  background: rgba(255,255,255,0.2);
  color: #ffffff;
}

/* =========================
   FILTERS
========================= */
.tabs {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: center;
}

.tab {
  background: rgba(255,255,255,0.85);
  color: #0f2742;
  padding: 8px 12px;
  border-radius: 12px;
  font-weight: 700;
  cursor: pointer;
  border: none;
}

.tab.active {
  background: #244a86;
  color: #fff;
}

.chips {
  padding-top: 10px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: center;
}

.chip {
  background: rgba(255,255,255,0.85);
  color: #0f2742;
  padding: 6px 10px;
  border-radius: 999px;
  border: none;
  font-weight: 600;
  cursor: pointer;
}

.chip[aria-pressed="true"] {
  background: #244a86;
  color: #fff;
}

.panel { display: none; }
.panel.active { display: block; }

</style>
</head>

<body>

<header>
<h1>Project Delivery - Case Studies</h1>
</header>

<main>
<div class="grid">
